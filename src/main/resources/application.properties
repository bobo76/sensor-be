spring.application.name=sensors
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sensorsdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

server.port=8080
server.address=0.0.0.0

sensor.polling.log-interval-hours=6

cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://192.168.1.79:8081}
