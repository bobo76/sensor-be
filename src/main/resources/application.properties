spring.application.name=sensors
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sensorsdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

server.port=8080
server.address=0.0.0.0

sensor.polling.log-interval-hours=6

claude.schedule.cron=0 55 6 * * *
claude.schedule.prompt=hello claude

cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://192.168.1.79:8081}

sensor.aggregation.tiers[0].max-duration-hours=24
sensor.aggregation.tiers[0].tier=RAW
sensor.aggregation.tiers[1].max-duration-hours=168
sensor.aggregation.tiers[1].tier=HOURLY
sensor.aggregation.tiers[2].max-duration-hours=720
sensor.aggregation.tiers[2].tier=SIX_HOURLY
sensor.aggregation.tiers[3].max-duration-hours=4380
sensor.aggregation.tiers[3].tier=DAILY
sensor.aggregation.tiers[4].max-duration-hours=8760
sensor.aggregation.tiers[4].tier=WEEKLY
sensor.aggregation.tiers[5].max-duration-hours=2147483647
sensor.aggregation.tiers[5].tier=MONTHLY
